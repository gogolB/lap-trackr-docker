services:
  db:
    image: postgres:15-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-bookworm
    restart: unless-stopped
    volumes:
      - /data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES}
      REDIS_URL: ${REDIS_URL}
      DATA_DIR: ${DATA_DIR}
      MODELS_DIR: ${MODELS_DIR:-/data/models}
      CALIBRATION_DIR: ${CALIBRATION_DIR:-/data/calibration}
      CAMERA_SERVICE_URL: http://camera:8001
    volumes:
      - /data:/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  camera:
    build:
      context: ./services/camera
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    runtime: nvidia
    ipc: host
    environment:
      ZED_SERIAL_ON_AXIS: ${ZED_SERIAL_ON_AXIS}
      ZED_SERIAL_OFF_AXIS: ${ZED_SERIAL_OFF_AXIS}
      DATA_DIR: ${DATA_DIR}
      CAMERA_HOST: ${CAMERA_HOST}
      CAMERA_PORT: ${CAMERA_PORT}
      CHARUCO_ROWS: ${CHARUCO_ROWS:-14}
      CHARUCO_COLS: ${CHARUCO_COLS:-9}
      CHARUCO_SQUARE_SIZE_MM: ${CHARUCO_SQUARE_SIZE_MM:-20.0}
      CHARUCO_MARKER_SIZE_MM: ${CHARUCO_MARKER_SIZE_MM:-15.0}
      CHARUCO_DICT: ${CHARUCO_DICT:-DICT_5X5_50}
      CALIBRATION_DIR: ${CALIBRATION_DIR:-/data/calibration}
    volumes:
      - /data:/data
      - /tmp:/tmp
      - /dev:/dev
      - /var/nvidia/nvcam/settings:/var/nvidia/nvcam/settings
      - /usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu/tegra
      - /usr/local/zed:/usr/local/zed
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  grader:
    build:
      context: ./services/grader
      dockerfile: Dockerfile
    restart: unless-stopped
    runtime: nvidia
    environment:
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      DATA_DIR: ${DATA_DIR}
      MODELS_DIR: ${MODELS_DIR:-/data/models}
    volumes:
      - /data:/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - internal

  exporter:
    build:
      context: ./services/grader
      dockerfile: Dockerfile.exporter
    command: ["python3", "-m", "app.export_worker"]
    restart: unless-stopped
    runtime: nvidia
    devices:
      - /dev/nvhost-msenc:/dev/nvhost-msenc
      - /dev/nvhost-nvdec:/dev/nvhost-nvdec
    environment:
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      DATA_DIR: ${DATA_DIR}
    volumes:
      - /data:/data
      - /usr/local/zed:/usr/local/zed
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/app/dist
    networks:
      - internal

  nginx:
    image: nginx:1.25-bookworm
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:8081"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
      camera:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  frontend_dist:
